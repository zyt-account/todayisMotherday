<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffcad4 0%, #ffb3c1 30%, #ff8fab 60%, #ff6b8a 100%);
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .heart-wrapper {
            position: relative;
            perspective: 1000px;
            animation: float 3s ease-in-out infinite;
            z-index: 100;
        }

        .heart {
            position: relative;
            width: 260px;
            height: 260px;
            animation: heartbeat 1.2s ease-in-out infinite;
            transform-style: preserve-3d;
            filter: drop-shadow(0 0 30px rgba(255, 107, 107, 0.8));
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 130px;
            height: 208px;
            background: linear-gradient(180deg, #ff4757 0%, #ff6b6b 50%, #ee5a5a 100%);
            border-radius: 65px 65px 0 0;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
            left: 0;
            top: 0;
            box-shadow: 
                inset 0 -20px 40px rgba(0, 0, 0, 0.3),
                inset 0 10px 20px rgba(255, 255, 255, 0.3),
                0 0 40px rgba(255, 107, 107, 0.6);
            animation: heartGlow 2s ease-in-out infinite;
        }

        .heart::after {
            transform: rotate(45deg);
            left: 130px;
        }

        .heart-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            animation: textPulse 1.2s ease-in-out infinite;
        }

        .heart-text {
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(255, 107, 107, 0.6),
                0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.8;
            white-space: nowrap;
            animation: textColor 3s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.08);
            }
            50% {
                transform: scale(1.02);
            }
            75% {
                transform: scale(1.05);
            }
        }

        @keyframes heartGlow {
            0%, 100% {
                filter: brightness(1) drop-shadow(0 0 15px rgba(255, 107, 107, 0.6));
            }
            50% {
                filter: brightness(1.3) drop-shadow(0 0 30px rgba(255, 107, 107, 0.9));
            }
        }

        @keyframes textPulse {
            0%, 100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 0.9;
                transform: translate(-50%, -50%) scale(1.05);
            }
        }

        @keyframes textColor {
            0%, 100% {
                color: #ffffff;
            }
            50% {
                color: #ffeaa7;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotateY(0deg);
            }
            50% {
                transform: translateY(-15px) rotateY(5deg);
            }
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.8) 0%, rgba(255, 107, 107, 0.2) 100%);
            animation: particleFloat 4s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0);
            }
            20% {
                opacity: 1;
                transform: translateY(-30px) scale(1);
            }
            80% {
                opacity: 0.8;
            }
            100% {
                opacity: 0;
                transform: translateY(-250px) scale(0.3);
            }
        }

        .floating-hearts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .float-heart {
            position: absolute;
            font-size: 24px;
            animation: floatUp 3s ease-in-out infinite;
            filter: drop-shadow(0 0 10px rgba(255, 107, 107, 0.5));
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) scale(0) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: translateY(-30px) scale(1) rotate(10deg);
            }
            80% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-200px) scale(0.5) rotate(30deg);
            }
        }

        .decoration {
            position: absolute;
            font-size: 28px;
            animation: twinkle 2s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .title {
            margin-top: 20px;
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 
                0 0 10px rgba(255, 71, 87, 0.8),
                0 0 20px rgba(255, 71, 87, 0.4),
                0 2px 4px rgba(0, 0, 0, 0.3);
            animation: titleWave 2s ease-in-out infinite;
            z-index: 1;
            text-align: center;
        }

        @keyframes titleWave {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .ripple {
            position: absolute;
            left: 50%;
            top: 50%;
            margin-left: -100px;
            margin-top: -100px;
            border-radius: 50%;
            border: 2px solid rgba(255, 107, 107, 0.3);
            animation: rippleExpand 2s ease-out infinite;
            pointer-events: none;
        }

        @keyframes rippleExpand {
            0% {
                width: 200px;
                height: 200px;
                opacity: 0.8;
            }
            100% {
                width: 300px;
                height: 300px;
                opacity: 0;
            }
        }

        .photo-float-container {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-photo {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.8);
            opacity: 0;
            pointer-events: auto;
            cursor: pointer;
        }

        .floating-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .floating-photo.animate {
            animation: floatToHeart 4s ease-in-out forwards;
        }

        @keyframes floatToHeart {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            70% {
                opacity: 1;
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(1.8);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <audio id="backgroundMusic" loop>
            <source src="拥有爱_剪辑5.m4a" type="audio/mpeg">
            您的浏览器不支持音频元素
        </audio>
        <div class="ripple" style="animation-delay: 0s;"></div>
        <div class="ripple" style="animation-delay: 1s;"></div>
        
        <div class="heart-wrapper">
            <div class="heart">
                <div class="heart-inner">
                    <div class="heart-text">祝妈妈<br>母亲节快乐！</div>
                </div>
            </div>
        </div>
        
        <div class="photo-float-container" id="photoFloatContainer"></div>
        
        <div class="title" color="#d468a9;"> &nbsp; &nbsp;&nbsp;  ❤️ 我爱你，妈妈 ❤️<br>✨ 祝我亲爱的妈妈母亲节快乐！✨</div>
        
        <div class="particles" id="particles"></div>
        
        <div class="floating-hearts" id="floatingHearts"></div>

        <span class="decoration" style="top: 5%; left: 5%; animation-delay: 0s;">✨</span>
        <span class="decoration" style="top: 15%; right: 8%; animation-delay: 0.3s;">🌟</span>
        <span class="decoration" style="bottom: 35%; left: 10%; animation-delay: 0.6s;">💞</span>
        <span class="decoration" style="bottom: 25%; right: 8%; animation-delay: 0.9s;">⭐</span>
        <span class="decoration" style="top: 2%; right: 12%; animation-delay: 1.2s;">✨</span>
        <span class="decoration" style="top: 20%; left: 15%; animation-delay: 0.4s;">💖</span>
        <span class="decoration" style="bottom: 20%; left: 5%; animation-delay: 0.7s;">💗</span>
        <span class="decoration" style="top: 10%; right: 2%; animation-delay: 1s;">💞</span>
    </div>

    <script>
        function createParticle() {
            const container = document.getElementById('particles');
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 8 + 4;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-20px';
            particle.style.animationDelay = Math.random() * 4 + 's';
            particle.style.animationDuration = (3 + Math.random() * 2) + 's';
            container.appendChild(particle);
            
            setTimeout(() => {
                particle.remove();
            }, 5000);
        }

        function createFloatingHeart() {
            const container = document.getElementById('floatingHearts');
            const heart = document.createElement('span');
            heart.className = 'float-heart';
            heart.textContent = ['💕', '💖', '💗', '💘', '💝', '💞', '💓', '💟'][Math.floor(Math.random() * 8)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.bottom = '-30px';
            heart.style.animationDelay = Math.random() * 3 + 's';
            heart.style.fontSize = (18 + Math.random() * 16) + 'px';
            heart.style.animationDuration = (2.5 + Math.random() * 1.5) + 's';
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        setInterval(createParticle, 300);
        setInterval(createFloatingHeart, 400);
        
        const photoData = [
            { src: 'tu1.jpg', alt: '妈妈和宝宝' },
            { src: 'tu2.jpg', alt: '母亲节庆祝' },
            { src: 'tu3.jpg', alt: '母女合照' },
            { src: 'tu4.jpg', alt: '家庭温馨' },
            { src: 'tu5.jpg', alt: '母子拥抱' },
            { src: 'tu6.jpg', alt: '睡前故事' },
            { src: 'tu7.jpg', alt: '公园玩耍' },
            { src: 'tu8.jpg', alt: '生日庆祝' },
            { src: 'tu9.jpg', alt: '牵手散步' },
            { src: 'tu10.jpg', alt: '亲吻额头' }
        ];
        
        let photoIndex = 0;
        
        function createFloatingPhoto() {
            const container = document.getElementById('photoFloatContainer');
            const photo = document.createElement('div');
            photo.className = 'floating-photo';
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const edge = Math.floor(Math.random() * 4);
            let startX, startY;
            
            switch(edge) {
                case 0: startX = Math.random() * window.innerWidth; startY = -80; break;
                case 1: startX = window.innerWidth + 80; startY = Math.random() * window.innerHeight; break;
                case 2: startX = Math.random() * window.innerWidth; startY = window.innerHeight + 80; break;
                case 3: startX = -80; startY = Math.random() * window.innerHeight; break;
            }
            
            const angle = Math.atan2(centerY - startY, centerX - startX);
            const distance = Math.max(window.innerWidth, window.innerHeight) * 0.8;
            const endX = centerX + distance * Math.cos(angle);
            const endY = centerY + distance * Math.sin(angle);
            
            const duration = 8000 + Math.random() * 2000;
            
            photo.innerHTML = '<img src="' + photoData[photoIndex].src + '" alt="' + photoData[photoIndex].alt + '">';
            photo.style.left = startX + 'px';
            photo.style.top = startY + 'px';
            
            const animation = photo.animate([
                { transform: 'translate(0, 0) scale(0.3) rotate(0deg)', opacity: 0 },
                { transform: 'translate(' + (centerX - startX) * 0.4 + 'px, ' + (centerY - startY) * 0.4 + 'px) scale(0.8) rotate(10deg)', opacity: 0.7, offset: 0.3 },
                { transform: 'translate(' + (centerX - startX) * 0.7 + 'px, ' + (centerY - startY) * 0.7 + 'px) scale(1.2) rotate(20deg)', opacity: 1, offset: 0.6 },
                { transform: 'translate(' + (centerX - startX) * 0.9 + 'px, ' + (centerY - startY) * 0.9 + 'px) scale(1.5) rotate(30deg)', opacity: 1, offset: 0.85 },
                { transform: 'translate(' + (centerX - startX) + 'px, ' + (centerY - startY) + 'px) scale(2.2) rotate(45deg)', opacity: 0 }
            ], {
                duration: duration,
                easing: 'ease-in',
                fill: 'forwards'
            });
            
            container.appendChild(photo);
            
            photoIndex = (photoIndex + 1) % photoData.length;
            
            animation.onfinish = function() {
                photo.remove();
            };
        }
        
        setInterval(createFloatingPhoto, 10);
        
        // 音频自动播放
        window.addEventListener('load', function() {
            const audio = document.getElementById('backgroundMusic');
            audio.volume = 0.5; // 设置音量为50%
            
            // 尝试自动播放
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    // 自动播放成功
                }).catch(function(error) {
                    // 自动播放被阻止，添加播放按钮
                    createPlayButton();
                });
            }
        });
        
        function createPlayButton() {
            const container = document.querySelector('.container');
            const button = document.createElement('button');
            button.innerHTML = '🎵 点击播放音乐';
            button.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                padding: 12px 24px;
                background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
                color: white;
                border: none;
                border-radius: 25px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
                z-index: 1000;
                animation: buttonPulse 2s ease-in-out infinite;
            `;
            button.onclick = function() {
                const audio = document.getElementById('backgroundMusic');
                audio.play();
                button.style.display = 'none';
            };
            container.appendChild(button);
            
            // 添加按钮脉动动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes buttonPulse {
                    0%, 100% { transform: translateX(-50%) scale(1); }
                    50% { transform: translateX(-50%) scale(1.05); }
                }
            `;
            document.head.appendChild(style);
        }
    </script>
</body>
</html>
